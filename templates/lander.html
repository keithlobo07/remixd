<!DOCTYPE html>
<html lang="en">
    <head>
        <title>REMIXD</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- Favicon -->
        <link rel="icon" href="../../../assets/remixd-logo.png">
        <!-- Custom CSS -->
        <link rel="stylesheet" href="landing_styles.css">
    </head>
    <body>
        <!-- Background Video -->
        <video autoplay muted loop id="bg-video">
            <source src="lander-assets/lander-bg.mp4" type="video/mp4">
        </video>
        <div class="container py-5 px-0 p-lg-5 text-center">
            <div class="row">
                <div class="col text-center">
                    <img src="../../../assets/remixd blue.png" alt="REMIXD Logo" class="img-fluid" style="max-width: 240px;">
                    <h1>Welcome to REMIXD</h1>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-4 offset-lg-2 gx-lg-2 col-12">
                    <button type="button" class="landerBtn">
                        <span>Sign up</span>
                        <img src="lander-assets/arrow-forward.svg" style="width: 24px; height: 24px;">
                    </button>
                </div>
                <div class="col-lg-4 col-12">
                    <button type="button" class="landerBtn">
                        <span>Log in</span>
                        <img src="lander-assets/arrow-forward.svg" style="width: 24px; height: 24px;">
                    </button>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <button type="button" class="landerBtn" id="guestBtn">
                        <span>Continue as Guest</span>
                        <img src="lander-assets/arrow-forward.svg" style="width: 24px; height: 24px;">
                    </button>
                </div>
            </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="landing_script.js"></script>
    </body>

</html>
