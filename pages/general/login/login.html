<!DOCTYPE html>
    <head>
        <title>REMIXD - Log in</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- Favicon -->
        <link rel="icon" href="../../../assets/remixd-logo.png">
        <!-- Custom CSS -->
        <link rel="stylesheet" href="login_styles.css">
    </head>
    <body>
        <div class="container m-5" id="header">
            <div class="row justify-content-start">
                <div class="col" id="logoCol">
                    <img src="../../../assets/remixd blue.png" alt="REMIXD Logo" class="img-fluid" style="max-width: 80px;">
                </div>
                <div class="col ms-sm-3 align-self-center">
                    <h5>REMIXD</h5>
                </div>
            </div>
        </div>
        <div class="container py-5 px-0 p-lg-5 text-center">
            <div class="row justify-content-center">
                <div class="col-12 text-center">
                    <h1>Log in</h1>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-6 col-lg-4 text-start">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password">
                        </div>
                    </form>
                </div>
                <div class="col-12 align-content-center mx-auto">
                    <button type="submit" class="btn" onClick="returnLoginInfo()">
                        <span>Log in</span>
                        <img src="login-assets/arrow-forward.svg" style="width: 24px; height: 24px;">
                    </button>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <script src="login_script.js"></script>
    </body>
